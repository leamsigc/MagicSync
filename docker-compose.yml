services:
  site:
    depends_on:
      - db
    env_file:
      - .env
    environment:
      - NUXT_HOST=0.0.0.0
      - NUXT_PYTHON_API_URL=http://python-backend:8000
    ports:
      - "3000:3000"
    build:
      dockerfile: Dockerfile
      context: .

  python-backend:
    depends_on:
      - db
    env_file:
      - packages/python-backend/.env
    environment:
      - BETTER_AUTH_URL=http://site:3000
      - CORS_ORIGINS=["http://localhost:3000","http://site:3000"]
    ports:
      - "8000:8000"
    build:
      dockerfile: Dockerfile
      context: ./packages/python-backend
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]

  db:
    image: ghcr.io/tursodatabase/libsql-server:latest
    env_file:
      - .env
    platform: linux/amd64
    ports:
      - "8080:8080"
      - "5001:5001"
    volumes:
      - ./sqld:/var/lib/sqld
    environment:
      - 'JWT=${JWT}'
      - 'SQLD_AUTH_JWT_KEY=${SQLD_AUTH_JWT_KEY}'
