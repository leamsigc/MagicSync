[project]
name = "magicsync-backend"
version = "0.2.0"
description = "MagicSync Python FastAPI backend for RAG and AI"
requires-python = ">=3.11"
dependencies = [
    "fastapi>=0.115.0",
    "uvicorn[standard]>=0.32.0",
    "sse-starlette>=2.2.0",
    "httpx>=0.27.0",
    "python-dotenv>=1.0.0",
    "langsmith>=0.1.0",
    "pydantic>=2.10.0",
    "pydantic-settings>=2.7.0",
    "pypdf>=4.0.0",
    "python-docx>=1.1.0",
    "beautifulsoup4>=4.12.0",
    "lxml>=5.0.0",
    "markdown>=3.6",
    "duckduckgo-search>=7.0.0",
    "litellm>=1.55.0",
    "pyjwt>=2.10.0",
    "presidio-analyzer>=2.1.0",
    "presidio-anonymizer>=2.1.0",
    "faker>=30.0.0",
    "pyyaml>=6.0.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0.0",
    "pytest-asyncio>=0.24.0",
    "ruff>=0.8.0",
]
knowledge-base = []
privacy = [
    "spacy>=3.7.0",
    "nameparser>=1.1.0",
    "rapidfuzz>=3.6.0",
    "gender-guesser>=0.4.0",
]
sandbox = [
    "docker>=7.0.0",
    "python-pptx>=0.6.23",
    "openpyxl>=3.1.0",
    "fpdf2>=2.7.0",
    "pandas>=2.2.0",
    "numpy>=1.26.0",
    "matplotlib>=3.8.0",
    "pillow>=10.0.0",
]
mcp = [
    "mcp>=1.0.0",
    "tiktoken>=0.7.0",
]
harness = []
pdf-enhanced = [
    "pdfplumber>=0.11.0",
]
agents = [
    "python-pptx>=1.1.0",
]

[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["."]

[tool.ruff]
target-version = "py311"
